version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: job-board-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobboard
      POSTGRES_PASSWORD: jobboard123
      POSTGRES_DB: jobboard
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: